<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1024px;
      height: 1024px;
      background: linear-gradient(160deg, #0F1929 0%, #1E3A8A 50%, #0F1929 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
    }

    .icon {
      width: 140px;
      height: 140px;
      border-radius: 30px;
      margin-bottom: 40px;
    }

    .title {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    .title .what { color: #EF4444; }
    .title .score { color: #3B82F6; }
    .title .premium { color: #FFD700; }

    .subtitle {
      font-size: 24px;
      color: #94A3B8;
      margin-bottom: 60px;
    }

    .plans {
      display: flex;
      gap: 20px;
      margin-bottom: 50px;
    }

    .plan {
      width: 260px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 30px 24px;
      text-align: center;
    }
    .plan.featured {
      border-color: #FFD700;
      background: rgba(255,215,0,0.08);
      transform: scale(1.05);
    }

    .plan-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #F1F5F9;
    }

    .plan-price {
      font-size: 40px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .plan.featured .plan-price { color: #FFD700; }

    .plan-period {
      font-size: 16px;
      color: #94A3B8;
      margin-bottom: 20px;
    }

    .plan-feature {
      font-size: 15px;
      color: #CBD5E1;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      background: #FFD700;
      color: #0F1929;
      font-size: 13px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .footer-text {
      font-size: 16px;
      color: #64748B;
    }
  </style>
</head>
<body>

  <img class="icon" src="icon.png" alt="WhatScore icon" />

  <div class="title">
    <span class="what">What</span><span class="score">Score</span> <span class="premium">Premium</span>
  </div>
  <div class="subtitle">Ad-free scoring experience</div>

  <div class="plans">
    <div class="plan">
      <div class="plan-name">Weekly</div>
      <div class="plan-price">$1.99</div>
      <div class="plan-period">per week</div>
      <div class="plan-feature">No ads</div>
      <div class="plan-feature">Cancel anytime</div>
    </div>

    <div class="plan featured">
      <div class="badge">Best Value</div>
      <div class="plan-name">Monthly</div>
      <div class="plan-price">$3.99</div>
      <div class="plan-period">per month</div>
      <div class="plan-feature">No ads</div>
      <div class="plan-feature">Save 50%</div>
      <div class="plan-feature">Cancel anytime</div>
    </div>

    <div class="plan">
      <div class="plan-name">Yearly</div>
      <div class="plan-price">$24.99</div>
      <div class="plan-period">per year</div>
      <div class="plan-feature">No ads</div>
      <div class="plan-feature">Save 75%</div>
      <div class="plan-feature">Cancel anytime</div>
    </div>
  </div>

  <div class="footer-text">Subscription auto-renews. Cancel anytime in Settings.</div>

</body>
</html>
